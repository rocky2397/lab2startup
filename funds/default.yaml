id: default
name: Deep-Tech Infrastructure Fund
description: >
  Example fund profile: a European pre-seed/seed VC focused on deep-tech
  infrastructure — platform engineering, secure compute, developer tooling,
  AI/ML infrastructure, and security — not biotech or consumer apps.
  Copy this file to create your own fund profile.

# Conferences the fund monitors before each submission cycle.
# sources: openreview (ML venues) | openalex (systems/security/devtools)
conferences:
  # --- ML & AI infrastructure (high) ---
  - name: NeurIPS
    sources: [openreview, openalex]
    priority: high
  - name: ICML
    sources: [openreview, openalex]
    priority: high
  - name: ICLR
    sources: [openreview, openalex]
    priority: high
  - name: MLSys
    sources: [openalex]
    priority: high

  # --- Systems & infrastructure (high) ---
  - name: OSDI
    sources: [openalex]
    priority: high
  - name: SOSP
    sources: [openalex]
    priority: high
  - name: NSDI
    sources: [openalex]
    priority: high
  - name: ASPLOS
    sources: [openalex]
    priority: high
  - name: EuroSys
    sources: [openalex]
    priority: high

  # --- Security (high) ---
  - name: USENIX Security
    sources: [openalex]
    priority: high
  - name: CCS
    sources: [openalex]
    priority: high

  # --- Developer tools & software engineering (medium) ---
  - name: ICSE
    sources: [openalex]
    priority: medium
  - name: FSE
    sources: [openalex]
    priority: medium

  # --- Data infrastructure (medium) ---
  - name: SIGMOD
    sources: [openalex]
    priority: medium
  - name: VLDB
    sources: [openalex]
    priority: medium

# Topic relevance for scoring and optional paper filtering
topic_keywords:
  - AI agents
  - ML systems
  - machine learning systems
  - platform engineering
  - developer tools
  - devtools
  - infrastructure
  - distributed systems
  - security
  - secure compute
  - AI infrastructure
  - MLOps
  - systems for ML

exclude_topic_keywords:
  - biotech
  - drug discovery
  - genomics
  - protein folding
  - clinical trial

topic_scores:
  AI agents: 20
  ML systems: 20
  Platform engineering: 19
  Security: 18
  robotics: 14
  biotech AI: 4

perplexity_context: |
  You are sourcing for a European pre-seed/seed VC investing in deep-tech
  infrastructure: platform engineering, developer tooling, AI/ML infrastructure, secure
  compute, and security — NOT biotech drug discovery or consumer social apps.
  Prioritize evidence of startups/products in those areas. Deprioritize pure academic
  biotech or life-sciences commercialization unless clearly infrastructure/tooling for ML.

default_paper_source: openreview

thesis_fit:
  europe_regions:
    - Germany
    - United Kingdom
    - Switzerland
    - France
    - Netherlands
    - Spain
    - Italy
    - Sweden
    - Norway
    - Denmark
    - Finland
    - Austria
    - Belgium
    - Ireland
    - Poland
    - Czech Republic
  infra_keywords:
    - platform engineering
    - developer tools
    - devtools
    - distributed systems
    - MLOps
    - secure compute
    - observability
    - ML systems
    - AI infrastructure
    - infrastructure
    - security
  application_keywords:
    - consulting
    - legal tech
    - consumer
    - social media
    - gaming
  hard_exclude_keywords:
    - drug discovery
    - biotech
    - genomics
    - protein folding
    - clinical trial
  sonar_min_score: 60
  sonar_max_calls: 30
